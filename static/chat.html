<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#0A0A0F">
    <title>Chat - CricPredict</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ===== CHAT LAYOUT ===== */
        .chat-page-wrapper {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 90px);
            max-width: 860px;
            margin: 0 auto;
            padding: 1rem;
        }

        @media (min-width: 1024px) {
            .chat-page-wrapper {
                height: calc(100vh - 64px);
                padding: 1.5rem 2rem;
            }
        }

        /* ===== CHAT HEADER ===== */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: linear-gradient(135deg, rgba(232, 23, 93, 0.08) 0%, rgba(27, 79, 216, 0.08) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .chat-header-icon {
            font-size: 1.5rem;
        }

        .chat-header-info h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .chat-header-info span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .chat-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .chat-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
        }

        .chat-status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
        }

        /* ===== MESSAGES AREA ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: var(--bg-base);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        /* ===== MESSAGE BUBBLES ===== */
        .message {
            max-width: 78%;
            padding: 0.6rem 0.9rem;
            border-radius: var(--radius);
            position: relative;
            animation: msgSlide 0.3s ease;
        }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.received {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 3px;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--gt), #2563EB);
            color: white;
            border-bottom-right-radius: 3px;
        }

        .message-sender {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.15rem;
        }

        .message.received .message-sender {
            color: var(--pbks);
        }

        .message.sent .message-sender {
            color: rgba(255, 255, 255, 0.8);
        }

        .message-text {
            font-size: 0.9rem;
            line-height: 1.45;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 0.25rem;
            text-align: right;
        }

        .message-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: var(--radius-sm);
            margin-top: 0.5rem;
            cursor: zoom-in;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: block;
        }

        .chat-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem 1rem;
            font-size: 0.9rem;
        }

        .chat-empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        /* ===== IMAGE PREVIEW ===== */
        .image-preview-bar {
            display: none;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            align-items: center;
            gap: 0.75rem;
        }

        .image-preview-bar.active {
            display: flex;
        }

        .image-preview-thumb {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .image-preview-name {
            flex: 1;
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .image-preview-remove {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: var(--transition);
        }

        .image-preview-remove:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* ===== INPUT AREA ===== */
        .chat-input-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: 1px solid var(--border);
            border-radius: 0 0 var(--radius) var(--radius);
        }

        .chat-input-field {
            flex: 1;
            background: var(--bg-base);
            border: 1px solid var(--border);
            padding: 0.65rem 1rem;
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: var(--transition);
        }

        .chat-input-field:focus {
            border-color: var(--gt);
            box-shadow: 0 0 0 3px rgba(27, 79, 216, 0.15);
        }

        .chat-input-field::placeholder {
            color: var(--text-muted);
        }

        /* ===== ACTION BUTTONS ===== */
        .chat-btn-attach {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
        }

        .chat-btn-attach:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-glass);
        }

        .chat-btn-attach svg {
            width: 18px;
            height: 18px;
        }

        .chat-btn-send {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--gt), #2563EB);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            color: white;
        }

        .chat-btn-send:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .chat-btn-send:active {
            transform: scale(0.95);
        }

        .chat-btn-send svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">🏏 CricPredict</div>
        <div class="nav-links">
            <a href="/static/dashboard.html">Dashboard</a>
            <a href="/static/history.html">History</a>
            <a href="/static/chat.html" class="active">Chat</a>
            <a href="/static/upload.html" class="admin-only hidden">Upload</a>
            <a href="/static/admin.html" class="admin-only hidden">Admin</a>
        </div>
        <div class="user-controls">
            <button id="btn-logout" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="chat-page-wrapper">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="chat-header-icon">💬</div>
            <div class="chat-header-info">
                <h2>IPL Discussion Room</h2>
                <span>All fans welcome • Public room</span>
            </div>
            <div class="chat-status">
                <div class="chat-status-dot" id="ws-status-dot"></div>
                <span id="ws-status-text">Connecting...</span>
            </div>
        </div>

        <!-- Messages -->
        <div id="chat-messages" class="chat-messages">
            <div class="chat-empty">
                <div class="chat-empty-icon">💬</div>
                Connecting to IPL Chat...
            </div>
        </div>

        <!-- Image Preview -->
        <div id="image-preview-bar" class="image-preview-bar">
            <img id="image-preview-thumb" src="" class="image-preview-thumb">
            <span id="image-preview-name" class="image-preview-name"></span>
            <div class="image-preview-remove" onclick="clearPreview()">×</div>
        </div>

        <!-- Input Bar -->
        <div class="chat-input-bar">
            <input type="file" id="image-input" accept="image/*" style="display: none;">
            <button class="chat-btn-attach" onclick="document.getElementById('image-input').click()" title="Attach image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
            </button>
            <input type="text" id="chat-input" class="chat-input-field" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn" class="chat-btn-send" title="Send message">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
