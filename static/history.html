<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#FAFAF9">
    <meta name="description" content="CricPredict match prediction history and accuracy tracker">
    <title>Match History - CricPredict</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand">🏏 CricPredict</div>
        <div class="nav-links">
            <a href="/static/dashboard.html">Dashboard</a>
            <a href="/static/history.html" class="active">History</a>
            <a href="/static/chat.html">Chat</a>
            <a href="/static/upload.html" class="admin-only hidden">Upload</a>
            <a href="/static/admin.html" class="admin-only hidden">Admin</a>
        </div>
        <div class="user-controls">
            <button id="btn-logout" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Accuracy Overview -->
        <div class="card match-hero accuracy-hero" style="margin-bottom: 0.75rem;">
            <div>
                <div class="text-muted font-bold font-sm mb-1">Total Predictions</div>
                <div style="font-size: 1.8rem; font-weight: 800;" id="acc-total">0</div>
            </div>
            <div>
                <div class="text-muted font-bold font-sm mb-1">Overall Accuracy</div>
                <div style="font-size: 2.2rem; font-weight: 800; color: var(--info);" id="acc-pct">0%</div>
                <div class="font-sm mt-1">
                    <span class="text-success font-bold" id="acc-correct">0</span> Correct
                    <span style="margin: 0 0.25rem; opacity: 0.3;">|</span>
                    <span class="text-danger font-bold" id="acc-incorrect">0</span> Wrong
                </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                <div><span class="badge bg-success">HIGH</span> <strong id="acc-high">0%</strong></div>
                <div><span class="badge bg-amber">MED</span> <strong id="acc-med">0%</strong></div>
                <div><span class="badge" style="background:var(--text-muted);color:white;border-color:var(--text-muted)">LOW</span> <strong id="acc-low">0%</strong></div>
            </div>
        </div>

        <!-- History Table -->
        <div class="card">
            <h3 style="margin-bottom: 0.75rem; font-size: 1rem;">Past Predictions</h3>
            <div class="table-scroll">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Match</th>
                            <th>Date</th>
                            <th>Teams</th>
                            <th>Predicted</th>
                            <th>Conf</th>
                            <th>Result</th>
                            <th class="action-col admin-only hidden">Action</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Modal for marking result -->
    <div id="result-modal" class="hidden result-modal">
        <div class="card" style="text-align: center;">
            <h3 style="margin-bottom: 0.5rem; font-size: 1rem;">Mark Actual Winner</h3>
            <p class="text-muted mb-1 font-sm" id="modal-match-title"></p>
            <div style="display: flex; gap: 0.75rem; margin-top: 1.25rem;">
                <button class="btn-primary" id="btn-win-a">Team A</button>
                <button class="btn-primary" id="btn-win-b">Team B</button>
            </div>
            <div style="margin-top: 0.75rem;">
                <button class="btn-logout" id="btn-cancel-modal" style="border: none;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/history.js"></script>
</body>
</html>
